name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Validate shell
        run: |
          bash -n scripts/*.sh
          shellcheck --severity=warning scripts/*.sh
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Reject model weights, secrets, and oversized artifacts
        run: python scripts/check-repository-artifacts.py
      - name: Verify vendored overlay inputs
        run: ./scripts/verify-overlay-sources.sh
      - name: Verify prompt fixtures
        run: |
          echo '785c5b31d1ce77612431b1289c0a097ed51ab1a6d4a07bccfb7a70f59df55f94  benchmarks/prompts/book-context-10k.txt' | sha256sum -c -
          echo 'a794ca243983eb3387bec6728db4b0c72a99ee2a98cfee7223269708e4ae228c  benchmarks/prompts/book-context-200k.txt' | sha256sum -c -
          echo '5e3a5f9c15da85d938993ef0c80153d26ba405a13689447fd7082d23355ca4ba  benchmarks/prompts/book-context-300k.txt' | sha256sum -c -
      - name: Render all Compose profiles
        shell: bash
        run: |
          cp .env.example .env
          set -a
          source .env
          set +a
          export MODEL_DIR=/tmp/models/test NODE_RANK=0 HEADLESS=
          export MASTER_ADDR=10.100.10.1 VLLM_HOST_IP=10.100.10.1
          export NCCL_SOCKET_IFNAME=eth0 NCCL_IB_HCA=roce0 NCCL_IB_GID_INDEX=3
          for profile in fast fast-c4 adaptive long-c4; do
            set -a
            source "profiles/$profile.env"
            set +a
            docker compose --env-file .env -f docker-compose.dspark.yml config -q
          done
