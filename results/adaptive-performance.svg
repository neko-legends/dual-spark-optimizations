<svg xmlns="http://www.w3.org/2000/svg" width="640" height="910" viewBox="0 0 640 910" role="img" aria-labelledby="adaptive-title adaptive-desc">
<title id="adaptive-title">Adaptive DSpark performance versus specialist profiles</title>
<desc id="adaptive-desc">At 10K, 200K, and 300K prompts, adaptive retains 91 to 98 percent of dedicated single-request decode speed and exceeds the best previously measured four-request aggregate throughput.</desc>
<rect width="100%" height="100%" rx="22" fill="#08111f"/>
<text x="32.0" y="45.0" fill="#f8fafc" font-size="28" font-family="system-ui, sans-serif" font-weight="750">One runtime. Fast alone. Faster together.</text>
<text x="32.0" y="73.0" fill="#9fb0c6" font-size="15" font-family="system-ui, sans-serif">Uncensored v1.1 · two DGX Sparks · matched 256-token tests</text>
