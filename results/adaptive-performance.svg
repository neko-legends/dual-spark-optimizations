<text x="52.0" y="119.0" fill="#ffedd5" font-size="14" font-family="system-ui, sans-serif" font-weight="750" letter-spacing="0.8">AUTOMATIC LIVE-BATCH ROUTING</text>
<text x="52.0" y="141.0" fill="#fff7ed" font-size="16" font-family="system-ui, sans-serif">No agent skill, request flag, or model reload required</text>
